<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D ISS Globe Tracker with Path</title>
    <!-- Include CesiumJS 3D Engine styles -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            margin: 0; padding: 0; background-color: #0b0c10; color: #fff;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden;
        }
        header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center; pointer-events: none;
            width: 90%; max-width: 500px;
        }
        h1 { 
            margin: 0 0 8px 0; color: #4e9ff5; font-size: 1.8rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #data-panel {
            background: rgba(22, 36, 71, 0.85); padding: 8px 16px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 1rem;
            backdrop-filter: blur(4px); pointer-events: auto;
            border: 1px solid rgba(78, 159, 245, 0.3);
        }
        span { font-weight: bold; color: #e43f5a; }
        #cesiumContainer { width: 100vw; height: 100vh; margin: 0; padding: 0; }
        .cesium-viewer-bottom, .cesium-viewer-animationContainer, .cesium-viewer-timelineContainer {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>3D ISS Location Tracker</h1>
        <div id="data-panel">
            Latitude: <span id="lat">0.0000</span>° | 
            Longitude: <span id="lon">0.0000</span>°
        </div>
    </header>
    
    <div id="cesiumContainer"></div>

    <!-- Load the CesiumJS 3D Library Engine -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <script>
        // Initialize the 3D Globe
        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                url : 'https://a.tile.openstreetmap.org/'
            }),
            terrainProvider: new Cesium.EllipsoidTerrainProvider(),
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            sceneModePicker: false,
            selectionIndicator: false,
            timeline: false,
            animation: false,
            navigationHelpButton: false,
            fullscreenButton: false
        });

        viewer.scene.globe.enableLighting = true;
        viewer.scene.skyAtmosphere.show = true;

        // Create a SampledPositionProperty to record the history of coordinates for the tracking path
        const positionProperty = new Cesium.SampledPositionProperty();
        positionProperty.forwardExtrapolationType = Cesium.ExtrapolationType.HOLD;

        // Create the 3D ISS Marker and attach a path tracking property
        const issEntity = viewer.entities.add({
            name: 'ISS',
            position: positionProperty, // Use our tracking position history
            billboard: {
                image: 'https://upload.wikimedia.org/wikipedia/commons/d/d0/International_Space_Station.svg',
                width: 60,
                height: 36,
                alignment: Cesium.BillboardAlignment.CENTER
            },
            path: {
                show: true,
                leadTime: 0,            // Do not try to predict or draw into the future
                trailTime: 3600,        // Show the tracking path trail for the last 60 minutes (3600 seconds)
                width: 4,               // Line thickness
                material: Cesium.Color.CYAN, // Vibrant neon blue tracking line color
                resolution: 1
            }
        });

        let firstLoad = true;

        async function getISS() {
            try {
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                if (!response.ok) throw new Error('API Rate Limit');
                const data = await response.json();
                
                const latitude = parseFloat(data.latitude);
                const longitude = parseFloat(data.longitude);
                const altitude = parseFloat(data.altitude) * 1000; // Convert km to meters

                const nextPosition = Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude);
                const currentTime = Cesium.JulianDate.now();

                // Add the current position pinpoint into the path history line array
                positionProperty.addSample(currentTime, nextPosition);
                
                // Set clock time to match the added sample points so the path renders correctly
                viewer.clock.currentTime = currentTime;

                if (firstLoad) {
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude + 15000000),
                        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                        duration: 2
                    });
                    firstLoad = false;
                }

                document.getElementById('lat').textContent = latitude.toFixed(4);
                document.getElementById('lon').textContent = longitude.toFixed(4);
            } catch (error) {
                console.warn("Retrying orbit telemetry...");
            }
        }

        getISS();
        setInterval(getISS, 3000);
    </script>
</body>
</html>
