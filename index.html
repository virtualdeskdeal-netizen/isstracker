<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D ISS Globe Tracker</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0; padding: 0; background-color: #000; color: #fff;
            overflow: hidden;
        }
        header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center; pointer-events: none;
            width: 90%; max-width: 500px;
        }
        h1 { 
            margin: 0 0 8px 0; color: #4e9ff5; font-size: 1.8rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }
        #data-panel {
            background: rgba(22, 36, 71, 0.85); padding: 8px 16px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 1rem;
            backdrop-filter: blur(4px); pointer-events: auto;
            border: 1px solid rgba(78, 159, 245, 0.3);
        }
        span { font-weight: bold; color: #e43f5a; }
        #globeViz { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <header>
        <h1>3D ISS Location Tracker</h1>
        <div id="data-panel">
            Latitude: <span id="lat">0.0000</span>° | 
            Longitude: <span id="lon">0.0000</span>°
        </div>
    </header>
    
    <div id="globeViz"></div>

    <!-- Load Lightweight 3D Globe Library -->
    <script src="https://unpkg.com/globe.gl"></script>
    <script>
        let pathHistory = [];

        // Initialize the 3D Globe
        const myGlobe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            .showAtmosphere(true)
            .atmosphereColor('#4e9ff5')
            .atmosphereAltitude(0.15);

        // Configure the orbital tracking line route
        myGlobe.pathPoints(d => d)
            .pathPointLat(d => d.lat)
            .pathPointLng(d => d.lng)
            .pathPointAlt(d => d.alt)
            .pathColor(() => '#00ffff')
            .pathStroke(3);

        // Native 3D Custom Layer to display the ISS Icon safely
        myGlobe.customLayerData([{ lat: 0, lng: 0, alt: 0.08 }]);
        myGlobe.customThreeObject(d => {
            // Create a clean 3D plane texture for the image canvas
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = 'https://upload.wikimedia.org/wikipedia/commons/d/d0/International_Space_Station.svg';
            
            const texture = new THREE.Texture(img);
            img.onload = () => texture.needsUpdate = true;

            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
            const geometry = new THREE.PlaneGeometry(16, 10); // Scaled 3D proportions
            return new THREE.Mesh(geometry, material);
        });
        
        // Auto-rotate the icon to constantly face the user's camera viewpoint
        myGlobe.customThreeObjectUpdate((obj, d) => {
            obj.lookAt(myGlobe.camera().position);
        });

        let firstLoad = true;

        async function getISS() {
            try {
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                if (!response.ok) throw new Error('API Rate Limit');
                const data = await response.json();
                
                const latitude = parseFloat(data.latitude);
                const longitude = parseFloat(data.longitude);
                const altitude = 0.08; 

                // Reposition the ISS 3D object marker
                myGlobe.customLayerData([{ lat: latitude, lng: longitude, alt: altitude }]);

                // Append coordinates to the tracking path line array
                pathHistory.push({ lat: latitude, lng: longitude, alt: altitude });
                myGlobe.pathsData([pathHistory]);

                // Update text metrics UI panels
                document.getElementById('lat').textContent = latitude.toFixed(4);
                document.getElementById('lon').textContent = longitude.toFixed(4);

                // Center camera view on initial payload grab
                if (firstLoad) {
                    myGlobe.pointOfView({ lat: latitude, lng: longitude, altitude: 2.0 }, 1000);
                    firstLoad = false;
                }
            } catch (error) {
                console.warn("Syncing live telemetry feed...");
            }
        }

        // Execute API loop
        getISS();
        setInterval(getISS, 3000);
    </script>
</body>
</html>
