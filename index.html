<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D ISS Globe Tracker</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #000; color: #fff; overflow: hidden; }
        header { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; width: 90%; max-width: 500px; }
        h1 { margin: 0 0 8px 0; color: #4e9ff5; font-size: 1.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        #data-panel { background: rgba(22, 36, 71, 0.85); padding: 8px 16px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 1rem; backdrop-filter: blur(4px); pointer-events: auto; border: 1px solid rgba(78, 159, 245, 0.3); }
        span { font-weight: bold; color: #e43f5a; }
        #globeViz { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <header>
        <h1>3D ISS Location Tracker</h1>
        <div id="data-panel">
            Latitude: <span id="lat">Loading...</span> | Longitude: <span id="lon">Loading...</span>
        </div>
    </header>
    <div id="globeViz"></div>

    <script src="https://unpkg.com/globe.gl"></script>
    <script>
        const myGlobe = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            // Country Border Configuration
            .polygonsData([])
            .polygonAltitude(0.01)
            .polygonCapColor(() => 'rgba(200, 200, 200, 0.1)')
            .polygonSideColor(() => 'rgba(200, 200, 200, 0.1)')
            .polygonStrokeColor(() => '#ffffff')
            // ISS Marker Styles
            .pointColor(() => '#e43f5a')
            .pointRadius(0.6);

        // Fetch country border data
        fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(countries => {
                myGlobe.polygonsData(countries.features);
            });

        let pathHistory = [];
        async function getISS() {
            try {
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await response.json();
                const lat = parseFloat(data.latitude), lng = parseFloat(data.longitude);
                
                document.getElementById('lat').textContent = lat.toFixed(4) + '°';
                document.getElementById('lon').textContent = lng.toFixed(4) + '°';

                myGlobe.pointsData([{ lat, lng, alt: 0.08 }]);
                pathHistory.push({ lat, lng, alt: 0.08 });
                myGlobe.pathsData([pathHistory]);
            } catch(e) {}
        }

        getISS();
        setInterval(getISS, 3000);
    </script>
</body>
</html>
