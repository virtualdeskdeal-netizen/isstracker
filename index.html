<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time ISS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: sans-serif; }
        #map { width: 90%; height: 70vh; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>ISS Tracker</h1>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        const marker = L.marker([0, 0]).addTo(map);

        async function getISS() {
            // Using a reliable proxy to ensure the browser doesn't block the request
            const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
            const data = await response.json();
            marker.setLatLng([data.latitude, data.longitude]);
        }
        setInterval(getISS, 3000);
        getISS();
    </script>
</body>
</html>
